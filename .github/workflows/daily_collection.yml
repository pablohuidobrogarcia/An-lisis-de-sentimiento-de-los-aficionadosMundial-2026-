name: Daily Data Collection

on:
  schedule:
    # Run daily at 08:00 UTC during the World Cup group stage
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so we can commit and push
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        id: pip-cache
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download es_core_news_sm
          python -m spacy download en_core_web_sm

      - name: Run collection step
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -m src.pipeline --step collect

      - name: Commit and push collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No new data to commit. Exiting cleanly."
            exit 0
          fi
          git commit -m "chore: daily data collection $(date +'%Y-%m-%d')"
          git push
